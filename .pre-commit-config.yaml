# Run `pre-commit install` after `pip install -e ".[dev]"`.
# Hooks run on `git commit`; any failing hook aborts the commit unless you use `git commit --no-verify`.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.10
    hooks:
      - id: ruff
  - repo: local
    hooks:
      - id: pdoc
        name: Build pdoc HTML (pdoc_html) and stage for commit
        entry: python scripts/build_docs_precommit.py
        language: system
        pass_filenames: false
        files: \.py$
