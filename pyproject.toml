[build-system]
requires = ["hatchling >= 1.26", "hatch-vcs >= 0.4"]
build-backend = "hatchling.build"

[project]
name = "sprime"
dynamic = ["version"]
description = "A biomedical library for screening high-throughput screening data in preclinical drug studies"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "Matthew Zamora", email = "matt@mocomakers.com"},
]
keywords = ["biomedical", "drug-screening", "high-throughput-screening", "preclinical"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
    "Topic :: Scientific/Engineering :: Medical Science Apps.",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "numpy >= 1.20.0, < 3.0",
    "scipy >= 1.7.0",
]

[project.optional-dependencies]
dev = [
    "pytest >= 7.0.0",
    "pytest-cov >= 4.0.0",
    "pdoc3",
    "pre-commit",
    "ruff >= 0.3.0",
]

# Lint + format: from repo root, `ruff check .` and `ruff format .` (see docs/background/development.md)
[tool.ruff]
target-version = "py38"
line-length = 100
src = ["src", "tests"]
extend-exclude = ["src/sprime/_version.py"]  # generated by hatch-vcs at build/install

[tool.ruff.lint]
# E/W = pycodestyle (PEP 8), F = Pyflakes, I = import sorting (isort-compatible)
select = ["E", "W", "F", "I"]
ignore = [
    "E501",  # line length — handled by `ruff format` or long scientific names
]

[tool.ruff.format]
quote-style = "double"
docstring-code-format = true

[project.urls]
Homepage = "https://github.com/mocomakers/sprime"
Documentation = "https://github.com/mocomakers/sprime#readme"
Repository = "https://github.com/mocomakers/sprime"
Issues = "https://github.com/mocomakers/sprime/issues"

[tool.hatch.version]
source = "vcs"

[tool.hatchling.build]
packages = ["src/sprime"]

[tool.hatch.build.hooks.vcs]
version-file = "src/sprime/_version.py"
